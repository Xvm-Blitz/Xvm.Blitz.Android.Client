name: Release

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer part to bump (default: patch)"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  JAVA_VERSION: "17"
  ARTIFACTS_DIR: artifacts

jobs:
  release:
    name: Build APK & Release
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, 'chore(release)')
      )
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve bump type
        id: bump
        shell: bash
        run: |
          bump="${{ github.event.inputs.bump }}"
          if [[ -z "$bump" ]]; then
            bump="patch"
          fi
          echo "Bump type: $bump"
          echo "type=$bump" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        shell: bash
        run: |
          chmod +x .github/scripts/bump-version.sh
          ./.github/scripts/bump-version.sh "${{ steps.bump.outputs.type }}"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build production APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testReleaseUnitTest --stacktrace

      - name: Prepare release artifact
        id: publish
        shell: bash
        run: |
          mkdir -p "${{ env.ARTIFACTS_DIR }}"

          version="${{ steps.version.outputs.VERSION }}"
          source_apk="app/build/outputs/apk/release/app-release.apk"
          apk_name="XVMBlitz-${version}-android.apk"
          target_apk="${{ env.ARTIFACTS_DIR }}/${apk_name}"

          if [[ ! -f "$source_apk" ]]; then
            echo "Built APK not found: $source_apk" >&2
            exit 1
          fi

          cp "$source_apk" "$target_apk"
          echo "Artifact: $target_apk"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XVMBlitz-${{ steps.version.outputs.VERSION }}-android
          path: ${{ env.ARTIFACTS_DIR }}/${{ steps.publish.outputs.apk_name }}
          if-no-files-found: error

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: XVM Blitz Android ${{ steps.version.outputs.VERSION }}
          files: ${{ env.ARTIFACTS_DIR }}/${{ steps.publish.outputs.apk_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
