name: CI

"on":
  push: {}
  pull_request: {}
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer part to bump. Release runs only via this manual workflow on main/master."
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  JAVA_VERSION: "17"
  ARTIFACTS_DIR: artifacts

jobs:
  build-and-test:
    name: Build & Test
    if: >
      github.event_name != 'push' ||
      !(
        github.actor == 'github-actions[bot]' &&
        contains(github.event.head_commit.message, 'chore(release)')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta-version.outputs.version }}
      apk_name: ${{ steps.meta-version.outputs.apk_name }}
      publish: ${{ steps.meta.outputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          branch="${{ github.ref_name }}"
          event_name="${{ github.event_name }}"
          publish="false"

          if [[ "$event_name" == "workflow_dispatch" ]] && [[ "$branch" == "main" || "$branch" == "master" ]]; then
            publish="true"
          fi

          bump="${{ github.event.inputs.bump }}"
          if [[ -z "$bump" ]]; then
            bump="patch"
          fi

          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "Publish release: ${publish} (branch=${branch}, event=${event_name}, bump=${bump})"

      - name: Bump version
        id: version
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        run: |
          chmod +x .github/scripts/bump-version.sh
          ./.github/scripts/bump-version.sh "${{ steps.meta.outputs.bump }}"

      - name: Read version
        id: current-version
        if: steps.meta.outputs.publish != 'true'
        shell: bash
        run: |
          version="$(sed -nE 's/.*versionName[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/p' app/build.gradle.kts | head -1)"
          if [[ -z "$version" ]]; then
            echo "versionName not found in app/build.gradle.kts" >&2
            exit 1
          fi
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${version}"

      - name: Export version outputs
        id: meta-version
        shell: bash
        run: |
          if [[ "${{ steps.meta.outputs.publish }}" == "true" ]]; then
            version="${{ steps.version.outputs.VERSION }}"
          else
            version="${{ steps.current-version.outputs.VERSION }}"
          fi

          apk_name="XVMBlitz-${version}-android.apk"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"
          echo "Using version ${version}, apk ${apk_name}"

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PUBLISH: ${{ steps.meta.outputs.publish }}
        shell: bash
        run: |
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" ]]; then
            mkdir -p app/keystore
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > app/keystore/xvm-production.jks
            {
              echo "storeFile=keystore/xvm-production.jks"
              echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=${ANDROID_KEY_ALIAS}"
              echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            } > app/keystore.properties
            echo "Using production keystore from repository secrets"
          elif [[ "${PUBLISH}" == "true" ]]; then
            echo "Production signing secrets are required to publish a release." >&2
            echo "Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD." >&2
            exit 1
          else
            echo "Production secrets not set — using committed debug keystore"
          fi

      - name: Build production APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testReleaseUnitTest --stacktrace

      - name: Prepare production artifact
        shell: bash
        run: |
          mkdir -p "${{ env.ARTIFACTS_DIR }}"

          apk_name="${{ steps.meta-version.outputs.apk_name }}"
          source_apk="app/build/outputs/apk/release/app-release.apk"
          target_apk="${{ env.ARTIFACTS_DIR }}/${apk_name}"

          if [[ ! -f "$source_apk" ]]; then
            echo "Built APK not found: $source_apk" >&2
            exit 1
          fi

          cp "$source_apk" "$target_apk"
          echo "Artifact: $target_apk"

      - name: Upload production APK
        uses: actions/upload-artifact@v7
        with:
          name: production-apk
          path: ${{ env.ARTIFACTS_DIR }}/${{ steps.meta-version.outputs.apk_name }}
          if-no-files-found: error

      - name: Commit version bump
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore(release): bump version to ${{ steps.meta-version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

  release:
    name: Build APK & Release
    needs: build-and-test
    if: needs.build-and-test.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download production APK
        uses: actions/download-artifact@v8
        with:
          name: production-apk
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-and-test.outputs.version }}
          name: XVM Blitz Android ${{ needs.build-and-test.outputs.version }}
          files: ${{ env.ARTIFACTS_DIR }}/${{ needs.build-and-test.outputs.apk_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Register release in XVM API
        env:
          CONTINUOUS_DELIVERY_S2S_KEY: ${{ secrets.CONTINUOUS_DELIVERY_S2S_KEY }}
          RELEASE_DOWNLOAD_BASE_URL: ${{ vars.RELEASE_DOWNLOAD_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CONTINUOUS_DELIVERY_S2S_KEY}" ]]; then
            echo "Secret CONTINUOUS_DELIVERY_S2S_KEY is required." >&2
            exit 1
          fi

          if [[ -z "${RELEASE_DOWNLOAD_BASE_URL}" ]]; then
            echo "Repository variable RELEASE_DOWNLOAD_BASE_URL is required." >&2
            exit 1
          fi

          version="${{ needs.build-and-test.outputs.version }}"
          apk_name="${{ needs.build-and-test.outputs.apk_name }}"
          base_url="${RELEASE_DOWNLOAD_BASE_URL%/}"
          download_url="${base_url}/releases/download/v${version}/${apk_name}"

          echo "Registering Android release ${version}"
          echo "Download URL: ${download_url}"

          curl -sfS -X POST "https://xvmblitz.ru/api/v1/releases" \
            -H "Content-Type: application/json" \
            -H "X-S2S-Key: ${CONTINUOUS_DELIVERY_S2S_KEY}" \
            -d "{\"platform\":\"android\",\"version\":\"${version}\",\"download_url\":\"${download_url}\"}"
